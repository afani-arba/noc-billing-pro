<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 200" width="100%" height="100%">
  <defs>
    <!-- Gold Gradient for LION -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FDE08B" />
      <stop offset="35%" stop-color="#D4AF37" />
      <stop offset="50%" stop-color="#AA7A00" />
      <stop offset="70%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#8B6508" />
    </linearGradient>

    <!-- Cyan Gradient for NET -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="50%" stop-color="#0088FF" />
      <stop offset="100%" stop-color="#003399" />
    </linearGradient>

    <!-- Glowing Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- 3D Drop Shadow Effect -->
    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="4" dy="6" stdDeviation="4" flood-color="#000" flood-opacity="0.8"/>
    </filter>
    
    <!-- Bevel Effect for LION (Fake 3D) -->
    <filter id="bevel">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset dx="2" dy="2" result="offsetBlur"/>
      <feSpecularLighting in="blur" surfaceScale="5" specularConstant=".75" specularExponent="20" lighting-color="#ffffff" result="specOut">
        <fePointLight x="-5000" y="-10000" z="20000"/>
      </feSpecularLighting>
      <feComposite in="specOut" in2="SourceAlpha" operator="in" result="specOut"/>
      <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1" k4="0" result="litPaint"/>
      <feMerge>
        <feMergeNode in="offsetBlur"/>
        <feMergeNode in="litPaint"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Network lines -->
  <g stroke="#00F2FE" stroke-width="1.5" opacity="0.5" fill="none">
    <path d="M 480,50 L 530,20 L 610,60 L 680,30 L 730,80 L 660,130 L 610,95 L 530,150 L 480,110 Z" />
    <path d="M 530,20 L 610,95 L 680,30" />
    <path d="M 610,60 L 660,130" />
    <path d="M 480,110 L 530,20" />
    <path d="M 480,50 L 610,95" />
    <path d="M 530,150 L 660,130" />
  </g>

  <!-- Network nodes -->
  <g fill="#00F2FE" filter="url(#glow)">
    <circle cx="480" cy="50" r="3" />
    <circle cx="530" cy="20" r="4" />
    <circle cx="610" cy="60" r="3" />
    <circle cx="680" cy="30" r="4" />
    <circle cx="730" cy="80" r="3" />
    <circle cx="660" cy="130" r="4" />
    <circle cx="610" cy="95" r="3" />
    <circle cx="530" cy="150" r="4" />
    <circle cx="480" cy="110" r="3" />
  </g>

  <!-- Big glowing dot for .NET -->
  <circle cx="450" cy="140" r="10" fill="#00F2FE" filter="url(#glow)" />
  <circle cx="450" cy="140" r="6" fill="#FFFFFF" />

  <!-- LION -->
  <text x="30" y="145" font-family="Georgia, 'Times New Roman', serif" font-size="115" font-weight="900" fill="url(#goldGrad)" letter-spacing="4" filter="url(#bevel)">
    LION
  </text>
  
  <!-- NET -->
  <text x="475" y="145" font-family="Arial, Helvetica, sans-serif" font-size="105" font-weight="800" fill="url(#cyanGrad)" letter-spacing="2" filter="url(#dropShadow)">
    NET
  </text>
</svg>
