# ══════════════════════════════════════════════════════════════════════
# GoBGP Configuration — NOC Billing Pro
# ══════════════════════════════════════════════════════════════════════
#
# File ini adalah konfigurasi GoBGP untuk BGP Content Steering.
# Sesuaikan nilai berikut sebelum deploy:
#
#   [global.config]
#     as          = AS number server Anda (misal: 65000)
#     router-id   = IP loopback/IP server Anda
#
#   [[neighbors]]
#     neighbor-address = IP MikroTik yang akan menjadi BGP peer
#     peer-as          = AS number MikroTik (misal: 65001)
#
# CARA KERJA BGP CONTENT STEERING:
#   1. GoBGP berjalan di HOST Ubuntu sebagai BGP route server
#   2. NOC Billing Pro backend inject prefix via `gobgp global rib add`
#   3. Prefix diberikan community tag (misal: 65000:251) per-MikroTik
#   4. Export policy memfilter prefix sesuai community masing-masing peer
#   5. MikroTik menerima only prefix yang sesuai → routing steering terjadi
#
# Dokumentasi GoBGP: https://github.com/osrg/gobgp
# ══════════════════════════════════════════════════════════════════════

[global.config]
  # Local AS number — ganti sesuai ASN Anda
  as = 65000
  # Router ID — ganti dengan IP server/loopback
  router-id = "10.254.254.254"
  # Listen di semua interface agar MikroTik bisa connect
  listen-addresses = ["0.0.0.0"]
  listen-port = 179

# ══════════════════════════════════════════════════════════════════════
# NEIGHBORS / BGP PEERS
# Tambahkan satu blok [[neighbors]] per MikroTik yang menjadi BGP peer
# ══════════════════════════════════════════════════════════════════════

# Contoh Peer 1: MikroTik utama (ganti IP & ASN sesuai topologi)
[[neighbors]]
  [neighbors.config]
    neighbor-address = "10.254.254.251"
    peer-as = 65001
    description = "MikroTik-GW-1"
  [neighbors.transport.config]
    passive-mode = false
  [neighbors.ebgp-multihop.config]
    enabled = true
    multihop-ttl = 10
  [neighbors.apply-policy.config]
    default-import-policy = "accept-route"
    default-export-policy = "reject-route"
    export-policy-list = ["policy-peer-251"]
  [[neighbors.afi-safis]]
    [neighbors.afi-safis.config]
      afi-safi-name = "ipv4-unicast"

# Contoh Peer 2: MikroTik sekunder (uncomment & sesuaikan)
# [[neighbors]]
#   [neighbors.config]
#     neighbor-address = "10.254.254.252"
#     peer-as = 65002
#     description = "MikroTik-GW-2"
#   [neighbors.transport.config]
#     passive-mode = false
#   [neighbors.ebgp-multihop.config]
#     enabled = true
#     multihop-ttl = 10
#   [neighbors.apply-policy.config]
#     default-import-policy = "accept-route"
#     default-export-policy = "reject-route"
#     export-policy-list = ["policy-peer-252"]
#   [[neighbors.afi-safis]]
#     [neighbors.afi-safis.config]
#       afi-safi-name = "ipv4-unicast"

# ══════════════════════════════════════════════════════════════════════
# COMMUNITY SETS
# Satu community per MikroTik peer untuk filter prefix export
# Format: "LOCAL_AS:PEER_TAG" (misal: 65000:251 untuk MikroTik-251)
# Tag ini otomatis di-set oleh BGP Steering Injector NOC Billing Pro
# ══════════════════════════════════════════════════════════════════════

[defined-sets]
  [[defined-sets.bgp-community-sets]]
    community-set-name = "comm-peer-251"
    community-list = ["65000:251"]

  # Uncomment untuk peer ke-2:
  # [[defined-sets.bgp-community-sets]]
  #   community-set-name = "comm-peer-252"
  #   community-list = ["65000:252"]

  # Set aggregat untuk reject prefix steering ke peer yang salah
  [[defined-sets.bgp-community-sets]]
    community-set-name = "all-steering"
    community-list = ["65000:251"]
    # Tambahkan "65000:252" jika ada 2+ peer: ["65000:251", "65000:252"]

# ══════════════════════════════════════════════════════════════════════
# POLICY DEFINITIONS
# Policy: hanya export prefix dengan community yang cocok ke peer-nya
# ══════════════════════════════════════════════════════════════════════

[[policy-definitions]]
  name = "policy-peer-251"
  # Statement 1: Accept prefix dengan community milik peer ini
  [[policy-definitions.statements]]
    name = "allow-my-community"
    [policy-definitions.statements.conditions.bgp-conditions]
      community-set = "comm-peer-251"
    [policy-definitions.statements.actions]
      route-disposition = "accept-route"
  # Statement 2: Reject prefix steering milik peer lain
  [[policy-definitions.statements]]
    name = "reject-other-steering"
    [policy-definitions.statements.conditions.bgp-conditions]
      community-set = "all-steering"
    [policy-definitions.statements.actions]
      route-disposition = "reject-route"

# Uncomment untuk peer ke-2:
# [[policy-definitions]]
#   name = "policy-peer-252"
#   [[policy-definitions.statements]]
#     name = "allow-my-community"
#     [policy-definitions.statements.conditions.bgp-conditions]
#       community-set = "comm-peer-252"
#     [policy-definitions.statements.actions]
#       route-disposition = "accept-route"
#   [[policy-definitions.statements]]
#     name = "reject-other-steering"
#     [policy-definitions.statements.conditions.bgp-conditions]
#       community-set = "all-steering"
#     [policy-definitions.statements.actions]
