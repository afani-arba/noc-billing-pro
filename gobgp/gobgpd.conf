# ══════════════════════════════════════════════════════════════════════
# GoBGP Configuration — NOC Billing Pro
# Target Peer: MikroTik RouterOS v6 (tidak support Extended Next-Hop)
# Fix: Nonaktifkan semua kapabilitas yang tidak kompatibel dengan ROS v6
# ══════════════════════════════════════════════════════════════════════

[global.config]
  as = 65000
  router-id = "10.125.125.235"
  port = 179
  local-address-list = ["0.0.0.0"]

# ── Global Export Policy: izinkan semua route keluar secara default ──
[global.apply-policy.config]
  default-export-policy = "accept-route"
  default-import-policy = "accept-route"

# ══════════════════════════════════════════════════════════════════════
# POLICY: Export semua route tanpa filter
# ══════════════════════════════════════════════════════════════════════
[[policy-definitions]]
  name = "pol-export-all"
  [[policy-definitions.statements]]
    name = "st-accept-all"
    [policy-definitions.statements.actions]
      route-disposition = "accept-route"

# ══════════════════════════════════════════════════════════════════════
# NEIGHBOR: MikroTik RouterOS v6
# KRITIS: Hanya aktifkan ipv4-unicast, JANGAN tambah ipv6 sama sekali
# agar GoBGP tidak mengirim ExtendedNexthopCapability ke ROS v6
# ══════════════════════════════════════════════════════════════════════
[[neighbors]]
  [neighbors.config]
    neighbor-address = "10.125.125.1"
    peer-as = 65001
    # Gunakan router-id GoBGP sebagai local ID yang stabil
    local-as = 65000
    # Matikan auto-detection yang bisa memicu Extended Nexthop
    auth-password = ""
    description = "MikroTik-ROS6-Peer"

  # Multihop: aktifkan agar next-hop di luar subnet bisa diterima
  [neighbors.ebgp-multihop.config]
    enabled = true
    multihop-ttl = 255

  # Transport: ikat ke IP sumber yang spesifik (IPv4 only)
  [neighbors.transport.config]
    local-address = "10.125.125.235"
    passive-mode = false

  # Graceful Restart: matikan agar tidak ada kompleksitas tambahan
  [neighbors.graceful-restart.config]
    enabled = false
    long-lived-enabled = false

  # Export Policy: wajib ada agar route dikirim ke peer
  [neighbors.apply-policy.config]
    export-policy-list = ["pol-export-all"]
    default-export-policy = "accept-route"
    default-import-policy = "accept-route"

  # ── KUNCI UTAMA: Hanya ipv4-unicast, TIDAK ADA ipv6, TIDAK ADA add-path ──
  # Dengan hanya mendefinisikan ipv4-unicast dan TIDAK mendefinisikan
  # ipv6-unicast, GoBGP tidak akan mengirim ExtendedNexthopCapability
  # karena capability itu hanya diperlukan untuk ipv4 over ipv6 nexthop
  [[neighbors.afi-safis]]
    [neighbors.afi-safis.config]
      afi-safi-name = "ipv4-unicast"
    # Matikan fitur yang tidak diperlukan untuk peer legacy
    [neighbors.afi-safis.mp-graceful-restart.config]
      enabled = false
    [neighbors.afi-safis.long-lived-graceful-restart.config]
      enabled = false
    [neighbors.afi-safis.add-paths.config]
      receive = false
      send-max = 0
